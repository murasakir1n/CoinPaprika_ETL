version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    _PIP_ADDITIONAL_REQUIREMENTS: "pandas sqlalchemy psycopg2-binary requests"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy

services:
  # Метабаза Airflow (хранит DAG-запуски, переменные, логи)
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  #Airflow: инициализация БД + создание admin-пользователя
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db migrate && airflow users create
        --username ${AIRFLOW_USER}
        --password ${AIRFLOW_PASSWORD}
        --firstname ${AIRFLOW_FIRSTNAME}
        --lastname ${AIRFLOW_LASTNAME}
        --role Admin
        --email ${AIRFLOW_EMAIL}"
    restart: on-failure

  #Airflow Scheduler - следит за расписанием и запускает DAG
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always


  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8082:8080"
    restart: always

volumes:
  postgres_data: